version: "1.0"
namespace: "lakehouse.assurance"

dataset: "kpi_final"
description: "Gold layer - Key Performance Indicators dashboard for business intelligence"

layer: "gold"
update_frequency: "daily"
owner: "data-platform"

upstream_datasets:
  - "client_contrat_silver"

schema:
  version: "1.0"
  fields:
    - name: "kpi_name"
      type: "string"
      nullable: false
      description: "Name of the KPI metric"

    - name: "kpi_value"
      type: "double"
      nullable: false
      description: "Numerical value of the KPI"

    - name: "kpi_category"
      type: "string"
      nullable: true
      description: "Category (Portfolio, Customer, Performance, etc.)"

    - name: "total_active_contracts"
      type: "long"
      nullable: true
      description: "Total number of active (En cours) contracts"

    - name: "total_clients"
      type: "long"
      nullable: true
      description: "Total unique customers"

    - name: "portfolio_value"
      type: "double"
      nullable: true
      description: "Total portfolio value (sum of all premiums)"

    - name: "avg_premium_per_customer"
      type: "double"
      nullable: true
      description: "Average premium amount per customer"

    - name: "retention_rate_pct"
      type: "double"
      nullable: true
      description: "Contract retention rate percentage (active/total)"

    - name: "guarantee_penetration_pct"
      type: "double"
      nullable: true
      description: "Percentage of contracts with guarantees"

    - name: "young_customer_pct"
      type: "double"
      nullable: true
      description: "Percentage of customers under 30 years old"

    - name: "motorcycle_pct"
      type: "double"
      nullable: true
      description: "Percentage of motorcycle contracts"

    - name: "avg_guarantees_per_contract"
      type: "double"
      nullable: true
      description: "Average number of guarantees per contract"

partitioning:
  - column: "year"
    type: "int"
  - column: "month"
    type: "int"
  - column: "day"
    type: "int"

quality_metrics:
  - metric: "portfolio_health"
    description: "Overall portfolio value and contracts"
  - metric: "customer_demographics"
    description: "Customer age and vehicle preference distribution"
  - metric: "revenue_metrics"
    description: "Premium revenue and average values"
  - metric: "retention_metrics"
    description: "Contract retention and churn rates"

slo:
  availability: "99.5%"
  freshness_hours: 24
  completeness_threshold: "95%"
