version: "1.0"
namespace: "lakehouse.assurance"

dataset: "contrat2"
description: "Contract Level 2 - Raw insurance contracts from source system"

layer: "bronze"
update_frequency: "daily"
owner: "data-platform"

schema:
  version: "1.0"
  fields:
    - name: "nusoc"
      type: "int"
      nullable: false
      description: "Unique customer ID (sociétaire)"
    
    - name: "nucon"
      type: "int"
      nullable: false
      description: "Contract number"
    
    - name: "cateco"
      type: "string"
      nullable: true
      description: "Vehicle category: A=Auto, M=Moto, C=Cyclo"
    
    - name: "prmaco"
      type: "double"
      nullable: true
      description: "Annual premium amount"
    
    - name: "etatco"
      type: "string"
      nullable: true
      description: "Contract status: 0=Annulé, 1=En cours, 2=Suspendu, etc."
    
    - name: "asaico"
      type: "int"
      nullable: true
      description: "Age at subscription"
    
    - name: "usagco1"
      type: "int"
      nullable: true
      description: "Vehicle usage: 0=Domicile/Travail, 1=Promenade, 3=Professionnel"
    
    - name: "pfco"
      type: "int"
      nullable: true
      description: "Vehicle fiscal power"

quality_rules:
  - rule: "not_null"
    columns: ["nusoc", "nucon"]
    severity: "error"
  
  - rule: "no_duplicates"
    columns: ["nusoc", "nucon"]
    severity: "error"
  
  - rule: "value_range"
    column: "asaico"
    min: 16
    max: 120
    severity: "warning"
  
  - rule: "value_range"
    column: "prmaco"
    min: 0
    max: 10000
    severity: "warning"

partitioning:
  enabled: false
  keys: []

sla:
  data_freshness_hours: 24
  availability_percentage: 99.5
  max_rows: 10000000
