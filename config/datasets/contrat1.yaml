version: "1.0"
namespace: "lakehouse.assurance"

dataset: "contrat1"
description: "Contract Level 1 - Raw insurance contracts (variant)"

layer: "bronze"
update_frequency: "daily"
owner: "data-platform"

schema:
  version: "1.0"
  fields:
    - name: "nusoc"
      type: "int"
      nullable: false
      description: "Unique customer ID"
    
    - name: "nucon"
      type: "int"
      nullable: false
      description: "Contract number"
    
    - name: "cateco"
      type: "string"
      nullable: true
      description: "Vehicle category"
    
    - name: "prmaco"
      type: "double"
      nullable: true
      description: "Annual premium"
    
    - name: "etatco"
      type: "string"
      nullable: true
      description: "Contract status"

quality_rules:
  - rule: "not_null"
    columns: ["nusoc", "nucon"]
    severity: "error"
  
  - rule: "no_duplicates"
    columns: ["nusoc", "nucon"]
    severity: "error"

sla:
  data_freshness_hours: 24
  availability_percentage: 99.5
  max_rows: 5000000
