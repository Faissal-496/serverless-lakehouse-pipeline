# ============================================================
# Spark Configuration — Local Docker
# 2 workers × 1 core × 1g RAM
# ============================================================

# Resources  (local[2] mode: everything runs in driver JVM inside airflow-worker container)
spark.driver.memory                              512m
spark.executor.memory                            512m
spark.executor.cores                             2

# Partitions
spark.sql.shuffle.partitions                     2
spark.default.parallelism                        2

# AQE
spark.sql.adaptive.enabled                       true
spark.sql.adaptive.coalescePartitions.enabled    true
spark.sql.adaptive.advisoryPartitionSizeInBytes  32m
spark.sql.adaptive.skewJoin.enabled              true

# Serialization
spark.serializer                                 org.apache.spark.serializer.JavaSerializer

# SQL
spark.sql.autoBroadcastJoinThreshold             -1
spark.sql.join.preferSortMergeJoin               true
spark.sql.session.timeZone                       UTC
spark.sql.sources.partitionOverwriteMode         dynamic
spark.sql.execution.arrow.pyspark.enabled        true

# Network
spark.network.timeout                            600s
spark.executor.heartbeatInterval                 60s
spark.sql.broadcastTimeout                       600

# S3A
spark.hadoop.fs.s3a.impl                         org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider     com.amazonaws.auth.DefaultAWSCredentialsProviderChain
spark.hadoop.fs.s3a.path.style.access            true
spark.hadoop.fs.s3a.connection.ssl.enabled       true
spark.hadoop.fs.s3a.fast.upload                  true
spark.hadoop.fs.s3a.threads.max                  4
spark.hadoop.fs.s3a.connection.maximum           10
spark.hadoop.fs.s3a.multipart.size               16m
spark.hadoop.fs.s3a.block.size                   16m

# Cache
spark.jars.ivy                                   /tmp/.ivy2
