spark:
  # master and deploy_mode are DEFAULTS - always overridden by env vars
  # SPARK_MASTER and SPARK_DEPLOY_MODE at runtime.
  #
  # Local Docker:  SPARK_MASTER=spark://spark-master:7077  SPARK_DEPLOY_MODE=client
  # AWS EMR:       SPARK_MASTER=yarn                       SPARK_DEPLOY_MODE=cluster
  master: "spark://spark-master:7077"
  deploy_mode: "client"

  config:

    # =========================
    # 1. PARTITIONS - tuned for <1GB data on 4 cores (2 workers x 2 cores)
    # For EMR/prod at scale: raise to 200+
    # =========================
    spark.sql.shuffle.partitions: 4
    spark.default.parallelism: 4

    # =========================
    # 2. EXECUTOR RESOURCES - local Docker (2 workers x 2 cores x 2GiB)
    # Host available RAM is ~1.4GB. Keep executors small to avoid OOM kills.
    #   driver:   512m (Spark requires sys_mem >= 1.5×driver; 256m failed validation)
    #   executor: 512m + overhead 128m = 640m per executor (safe on 2g worker)
    #   2 executors total (1 per worker), 2 cores each
    # =========================
    spark.driver.memory: 512m
    spark.executor.memory: 512m
    spark.executor.memoryOverhead: 128m
    spark.executor.cores: 2
    spark.executor.instances: 2

    # =========================
    # 3. ADAPTIVE QUERY EXECUTION - auto-coalesces partitions at runtime
    # =========================
    spark.sql.adaptive.enabled: true
    spark.sql.adaptive.coalescePartitions.enabled: true
    spark.sql.adaptive.advisoryPartitionSizeInBytes: 64m
    spark.sql.adaptive.skewJoin.enabled: true

    # =========================
    # 4. SERIALIZATION
    # =========================
    spark.serializer: org.apache.spark.serializer.KryoSerializer
    spark.kryoserializer.buffer.max: 64m

    # =========================
    # 5. S3A - optimised for small files and low-latency
    # =========================
    spark.hadoop.fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
    spark.hadoop.fs.s3a.aws.credentials.provider: com.amazonaws.auth.EnvironmentVariableCredentialsProvider
    spark.hadoop.fs.s3a.path.style.access: true
    spark.hadoop.fs.s3a.connection.ssl.enabled: true
    spark.hadoop.fs.s3a.fast.upload: true
    spark.hadoop.fs.s3a.threads.max: 8
    spark.hadoop.fs.s3a.connection.maximum: 20
    spark.hadoop.fs.s3a.multipart.size: 32m
    spark.hadoop.fs.s3a.block.size: 32m

    # =========================
    # 6. NETWORK & STABILITY
    # =========================
    spark.network.timeout: 600s
    spark.executor.heartbeatInterval: 120s
    spark.sql.broadcastTimeout: 600

    # =========================
    # 7. SQL
    # =========================
    spark.sql.session.timeZone: UTC
    # Disable auto-broadcast: executors OOM when collecting broadcast data under
    # Docker memory constraints (512m executor, ~1.4GB host free RAM).
    # BroadcastExchangeExec causes java.io.EOFException on KryoDeserializationStream.
    spark.sql.autoBroadcastJoinThreshold: -1
    spark.sql.join.preferSortMergeJoin: true

    # =========================
    # 8. JAR CACHE - reuse ivy cache across spark-submit invocations
    # =========================
    spark.jars.ivy: /tmp/.ivy2
