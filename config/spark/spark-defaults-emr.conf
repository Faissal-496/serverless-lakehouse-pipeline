# Spark configuration for EMR Serverless.
# Uploaded to S3 and referenced via --properties-file at job submission.

# Resources (EMR handles auto-scaling)
spark.driver.memory                              2g
spark.executor.memory                            4g
spark.executor.cores                             4
spark.dynamicAllocation.enabled                  true
spark.dynamicAllocation.minExecutors             2
spark.dynamicAllocation.maxExecutors             20

# Partitions
spark.sql.shuffle.partitions                     200
spark.default.parallelism                        200

# Adaptive Query Execution
spark.sql.adaptive.enabled                       true
spark.sql.adaptive.coalescePartitions.enabled    true
spark.sql.adaptive.advisoryPartitionSizeInBytes  128m
spark.sql.adaptive.skewJoin.enabled              true

# Serialization
spark.serializer                                 org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer.max                  128m

# SQL
spark.sql.autoBroadcastJoinThreshold             50m
spark.sql.join.preferSortMergeJoin               true
spark.sql.session.timeZone                       UTC
spark.sql.sources.partitionOverwriteMode         dynamic
spark.sql.execution.arrow.pyspark.enabled        true

# S3A (same-region optimization)
spark.hadoop.fs.s3a.impl                         org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.fast.upload                  true
spark.hadoop.fs.s3a.threads.max                  64
spark.hadoop.fs.s3a.connection.maximum           100
spark.hadoop.fs.s3a.multipart.size               64m
spark.hadoop.fs.s3a.block.size                   128m

# Ivy cache
spark.jars.ivy                                   /tmp/.ivy2
