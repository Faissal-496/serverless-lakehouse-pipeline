version: '3.8'

services:
  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: spark-worker-1
    networks:
      - serverless-lakehouse-pipeline_lakehouse-network
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=4
      - SPARK_WORKER_PORT=7078
      - SPARK_LOCAL_IP=spark-worker-1
      - SPARK_WORKER_WEBUI_PORT=8081
    entrypoint: >
      bash -c "
      cd /opt/spark-3.5.0-bin-hadoop3 &&
      ./bin/spark-class org.apache.spark.deploy.worker.Worker 
      spark://spark-master:7077 
      --webui-port 8081 
      --host spark-worker-1 
      --port 7078
      "
    volumes:
      - /home/fisal_bel/projects/data_projects/serverless-lakehouse-pipeline/data:/opt/lakehouse/data:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "2"
    healthcheck:
      test: [ "CMD", "pgrep", "-f", "spark.deploy.worker" ]
      interval: 10s
      timeout: 5s
      retries: 3

  spark-worker-2:
    image: apache/spark:3.5.0
    container_name: spark-worker-2
    networks:
      - serverless-lakehouse-pipeline_lakehouse-network
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=4
      - SPARK_WORKER_PORT=7079
      - SPARK_LOCAL_IP=spark-worker-2
      - SPARK_WORKER_WEBUI_PORT=8082
    entrypoint: >
      bash -c "
      cd /opt/spark-3.5.0-bin-hadoop3 &&
      ./bin/spark-class org.apache.spark.deploy.worker.Worker 
      spark://spark-master:7077 
      --webui-port 8082 
      --host spark-worker-2 
      --port 7079
      "
    volumes:
      - /home/fisal_bel/projects/data_projects/serverless-lakehouse-pipeline/data:/opt/lakehouse/data:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "2"
    healthcheck:
      test: [ "CMD", "pgrep", "-f", "spark.deploy.worker" ]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  serverless-lakehouse-pipeline_lakehouse-network:
    external: true
