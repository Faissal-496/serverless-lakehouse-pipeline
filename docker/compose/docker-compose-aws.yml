# Docker Compose for Airflow on AWS EC2 instances.
# External dependencies: RDS (PostgreSQL), Amazon MQ (RabbitMQ).
# All connection strings are injected from the .env file generated by user_data.
# Spark is NOT installed in these containers. ETL jobs run on EMR Serverless.

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE}
  restart: unless-stopped
  environment:
    # Airflow core
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags/repo/orchestration/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__DEFAULT_TASK_RETRIES: "2"
    AIRFLOW__CORE__DEFAULT_TASK_RETRY_DELAY_SEC: "300"
    # Database
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_CONN}
    # Celery
    AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW_BROKER_URL}
    AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW_RESULT_BACKEND}
    # Security
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    # Remote logging to S3 so logs are centralized across all EC2 hosts
    AIRFLOW__LOGGING__REMOTE_LOGGING: "true"
    AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: "aws_default"
    AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: "s3://${S3_BUCKET}/logs/airflow"
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    # Application
    APP_ENV: ${APP_ENV:-prod}
    S3_BUCKET: ${S3_BUCKET}
    AWS_DEFAULT_REGION: ${AWS_REGION:-eu-west-3}
    EMR_APPLICATION_ID: ${EMR_APPLICATION_ID:-}
    EMR_EXECUTION_ROLE_ARN: ${EMR_EXECUTION_ROLE_ARN:-}
    LAKEHOUSE_WHL_S3: ${LAKEHOUSE_WHL_S3:-}
    SPARK_CONF_S3: ${SPARK_CONF_S3:-}
  volumes:
    - dags_data:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
  networks:
    - lakehouse_aws

services:
  # GitSync sidecar pulls DAGs (and the full repo) from GitHub.
  # The DAG folder is set to the subdirectory inside the cloned repo.
  git-sync:
    image: registry.k8s.io/git-sync/git-sync:v4.1.0
    restart: unless-stopped
    environment:
      GITSYNC_REPO: ${GIT_SYNC_REPO}
      GITSYNC_BRANCH: ${GIT_SYNC_BRANCH:-main}
      GITSYNC_ROOT: /git
      GITSYNC_DEST: repo
      GITSYNC_WAIT: "60"
      GITSYNC_ONE_TIME: "false"
    volumes:
      - dags_data:/git
    networks:
      - lakehouse_aws

  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "
        if [ \"$${AIRFLOW_INIT:-false}\" = 'true' ]; then
          airflow db migrate
          airflow users create --username admin --password admin \
            --firstname Airflow --lastname Admin --role Admin \
            --email admin@octaa.tech || true
        fi
        exec airflow webserver
      "
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "
        if [ \"$${AIRFLOW_INIT:-false}\" = 'true' ]; then
          airflow db migrate
        fi
        exec airflow scheduler
      "

  airflow-worker:
    <<: *airflow-common
    command: celery worker --queues=default

  airflow-flower:
    <<: *airflow-common
    command: celery flower
    ports:
      - "5555:5555"
    profiles:
      - flower

volumes:
  dags_data:
  airflow_logs:

networks:
  lakehouse_aws:
    driver: bridge
