version: '3.8'

# ============================================================================
# DOCKER COMPOSE FOR ENTERPRISE LAKEHOUSE ARCHITECTURE
# ============================================================================
#
# PRODUCTION MODE:
#   External RDS instance (set RDS_ENDPOINT in .env.aws)
#   Local Spark + Airflow connect to cloud RDS
#
# DEVELOPMENT MODE:
#   Optional local PostgreSQL service (commented below)
#   Use for testing without AWS access

services:
  # ============================================================================
  # SPARK - ETL ENGINE (LOCAL[*] -> EMR IN PHASE 2)
  # ============================================================================
  lakehouse-spark:
    build:
      context: ../..
      dockerfile: docker/spark/Dockerfile
    image: lakehouse-spark:latest
    container_name: lakehouse-spark
    environment:
      # Application
      - APP_ENV=${APP_ENV:-prod}
      - LOG_LEVEL=INFO
      - PYTHONPATH=/opt/lakehouse/src

      # AWS Configuration
      - AWS_REGION=${AWS_REGION:-eu-west-3}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}

      # S3 Configuration (Data Lake)
      - S3_BUCKET=${S3_BUCKET:-lakehouse-assurance-moto-prod}
      - S3_DATA_PATH=${S3_DATA_PATH:-s3a://lakehouse-assurance-moto-prod}
      - S3_LOGS_PATH=${S3_LOGS_PATH:-s3a://lakehouse-assurance-moto-prod/logs}
      - S3_CONFIG_PATH=${S3_CONFIG_PATH:-s3a://lakehouse-assurance-moto-prod/config}

      # CloudWatch Logging Configuration (Phase 1 enhancement)
      - CLOUDWATCH_ENABLED=${CLOUDWATCH_ENABLED:-true}
      - CLOUDWATCH_LOG_GROUP=${CLOUDWATCH_LOG_GROUP_SPARK:-/aws/lakehouse/spark}
      - CLOUDWATCH_STREAM_NAME=spark-etl-${EXECUTION_DATE:-local}
      - CLOUDWATCH_REGION=${AWS_REGION:-eu-west-3}

      # RDS Connection (External managed database)
      - RDS_ENDPOINT=${RDS_ENDPOINT:-postgres}
      - RDS_PORT=${RDS_PORT:-5432}
      - DB_NAME=${DB_NAME:-lakehouse_prod}
      - DB_USER=${DB_USER:-airflow}
      - DB_PASSWORD=${DB_PASSWORD:-airflow}
      - SECRETS_MANAGER_ENABLED=${SECRETS_MANAGER_ENABLED:-true}

      # Glue Catalog Configuration (Phase 1)
      - GLUE_DATABASE=${GLUE_DATABASE:-lakehouse}
      - GLUE_DB_NAME=${GLUE_DB_NAME:-lakehouse}
      - GLUE_REGION=${AWS_REGION:-eu-west-3}

      # Data Quality Framework (Phase 1)
      - DATA_QUALITY_ENABLED=true
      - DATA_QUALITY_FRAMEWORK=great_expectations

      # Iceberg Configuration (Phase 1 - future)
      - ICEBERG_ENABLED=false
      - ICEBERG_CATALOG=glue

      # Spark Configuration (Phase 2: tune for EMR)
      - SPARK_MASTER=local[*]
      - SPARK_DRIVER_MEMORY=4g
      - SPARK_EXECUTOR_MEMORY=4g
      - SPARK_SQL_SHUFFLE_PARTITIONS=200
      - SPARK_SQL_ADAPTIVE_ENABLED=true
      - SPARK_SQL_ADAPTIVE_COALESCE_PARTITIONS_ENABLED=true

    volumes:
      - ../../src:/opt/lakehouse/src:ro
      - ../../config:/opt/lakehouse/config:ro
      - ../../data:/opt/lakehouse/data:ro
      - spark_logs:/opt/spark/logs
      - spark_work:/tmp/spark-work

    ports:
      - "4040:4040"   # Spark UI
      - "18080:18080"  # Spark History Server

    networks:
      - lakehouse-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4040/api/v1/applications"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    restart: unless-stopped
    depends_on: []

  # ============================================================================
  # GIT SYNC - DAGs + Plugins (NO DAGs INSIDE AIRFLOW IMAGE)
  # ============================================================================
  git-sync:
    image: registry.k8s.io/git-sync/git-sync:v4.1.0
    container_name: lakehouse-git-sync
    environment:
      - GIT_SYNC_REPO=${GIT_SYNC_REPO}
      - GIT_SYNC_BRANCH=${GIT_SYNC_BRANCH:-main}
      - GIT_SYNC_ROOT=/opt/airflow/dags
      - GIT_SYNC_DEST=repo
      - GIT_SYNC_WAIT=60
      - GIT_SYNC_ONE_TIME=false
      - GIT_SYNC_DEPTH=1
      - GIT_SYNC_MAX_FAILURES=-1
    volumes:
      - airflow_dags:/opt/airflow/dags
    networks:
      - lakehouse-network
    restart: unless-stopped

  # ============================================================================
  # AIRFLOW - HA WITH CELERY EXECUTOR
  # ============================================================================
  airflow-webserver:
    image: ${AIRFLOW_IMAGE}
    container_name: lakehouse-airflow-webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW_DB_CONN}
      - AIRFLOW__CELERY__BROKER_URL=${AIRFLOW_BROKER_URL}
      - AIRFLOW__CELERY__RESULT_BACKEND=${AIRFLOW_RESULT_BACKEND}
      - AIRFLOW__CELERY__BROKER_USE_SSL=True
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags/repo/orchestration/airflow/dags
      - AIRFLOW__CORE__PLUGINS_FOLDER=/opt/airflow/dags/repo/orchestration/airflow/plugins
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS=False
      - AIRFLOW__WEBSERVER__RBAC=True
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=False
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - AIRFLOW__LOGGING__LOG_LEVEL=INFO
      - AIRFLOW__LOGGING__REMOTE_LOGGING=True
      - AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER=s3://${S3_BUCKET:-lakehouse-assurance-moto-prod}/airflow/logs
      - AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID=aws_default
      - AIRFLOW__LOGGING__ENCRYPT_S3_LOGS=True
      - EMR_SERVERLESS_APPLICATION_ID=${EMR_SERVERLESS_APPLICATION_ID:-}
      - EMR_SERVERLESS_EXECUTION_ROLE_ARN=${EMR_SERVERLESS_EXECUTION_ROLE_ARN:-}
      - EMR_SERVERLESS_S3_ENTRYPOINT=${EMR_SERVERLESS_S3_ENTRYPOINT:-}
      - EMR_SERVERLESS_LOG_URI=${EMR_SERVERLESS_LOG_URI:-}
      - PYTHONPATH=/opt/airflow/dags/repo/src
      - CONFIG_DIR=/opt/airflow/dags/repo/config
      - APP_ENV=${APP_ENV:-prod}
      - AWS_REGION=${AWS_REGION:-eu-west-3}
      - S3_BUCKET=${S3_BUCKET:-lakehouse-assurance-moto-prod}
      - AIRFLOW_INIT=${AIRFLOW_INIT:-false}
    volumes:
      - airflow_logs:/opt/airflow/logs
      - airflow_work:/opt/airflow/work
      - airflow_dags:/opt/airflow/dags
    ports:
      - "8080:8080"   # Airflow Web UI
    depends_on:
      - git-sync
    networks:
      - lakehouse-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  airflow-scheduler:
    image: ${AIRFLOW_IMAGE}
    container_name: lakehouse-airflow-scheduler
    command: ["scheduler"]
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW_DB_CONN}
      - AIRFLOW__CELERY__BROKER_URL=${AIRFLOW_BROKER_URL}
      - AIRFLOW__CELERY__RESULT_BACKEND=${AIRFLOW_RESULT_BACKEND}
      - AIRFLOW__CELERY__BROKER_USE_SSL=True
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags/repo/orchestration/airflow/dags
      - AIRFLOW__CORE__PLUGINS_FOLDER=/opt/airflow/dags/repo/orchestration/airflow/plugins
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS=False
      - AIRFLOW__LOGGING__LOG_LEVEL=INFO
      - AIRFLOW__LOGGING__REMOTE_LOGGING=True
      - AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER=s3://${S3_BUCKET:-lakehouse-assurance-moto-prod}/airflow/logs
      - AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID=aws_default
      - AIRFLOW__LOGGING__ENCRYPT_S3_LOGS=True
      - EMR_SERVERLESS_APPLICATION_ID=${EMR_SERVERLESS_APPLICATION_ID:-}
      - EMR_SERVERLESS_EXECUTION_ROLE_ARN=${EMR_SERVERLESS_EXECUTION_ROLE_ARN:-}
      - EMR_SERVERLESS_S3_ENTRYPOINT=${EMR_SERVERLESS_S3_ENTRYPOINT:-}
      - EMR_SERVERLESS_LOG_URI=${EMR_SERVERLESS_LOG_URI:-}
      - PYTHONPATH=/opt/airflow/dags/repo/src
      - CONFIG_DIR=/opt/airflow/dags/repo/config
      - APP_ENV=${APP_ENV:-prod}
      - AWS_REGION=${AWS_REGION:-eu-west-3}
      - S3_BUCKET=${S3_BUCKET:-lakehouse-assurance-moto-prod}
      - AIRFLOW_INIT=${AIRFLOW_INIT:-false}
    volumes:
      - airflow_logs:/opt/airflow/logs
      - airflow_work:/opt/airflow/work
      - airflow_dags:/opt/airflow/dags
    depends_on:
      - git-sync
    networks:
      - lakehouse-network
    restart: unless-stopped

  airflow-worker:
    image: ${AIRFLOW_IMAGE}
    container_name: lakehouse-airflow-worker
    command: ["celery", "worker"]
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW_DB_CONN}
      - AIRFLOW__CELERY__BROKER_URL=${AIRFLOW_BROKER_URL}
      - AIRFLOW__CELERY__RESULT_BACKEND=${AIRFLOW_RESULT_BACKEND}
      - AIRFLOW__CELERY__BROKER_USE_SSL=True
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags/repo/orchestration/airflow/dags
      - AIRFLOW__CORE__PLUGINS_FOLDER=/opt/airflow/dags/repo/orchestration/airflow/plugins
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS=False
      - AIRFLOW__CELERY__WORKER_CONCURRENCY=${AIRFLOW_WORKER_CONCURRENCY:-4}
      - AIRFLOW__LOGGING__LOG_LEVEL=INFO
      - AIRFLOW__LOGGING__REMOTE_LOGGING=True
      - AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER=s3://${S3_BUCKET:-lakehouse-assurance-moto-prod}/airflow/logs
      - AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID=aws_default
      - AIRFLOW__LOGGING__ENCRYPT_S3_LOGS=True
      - EMR_SERVERLESS_APPLICATION_ID=${EMR_SERVERLESS_APPLICATION_ID:-}
      - EMR_SERVERLESS_EXECUTION_ROLE_ARN=${EMR_SERVERLESS_EXECUTION_ROLE_ARN:-}
      - EMR_SERVERLESS_S3_ENTRYPOINT=${EMR_SERVERLESS_S3_ENTRYPOINT:-}
      - EMR_SERVERLESS_LOG_URI=${EMR_SERVERLESS_LOG_URI:-}
      - PYTHONPATH=/opt/airflow/dags/repo/src
      - CONFIG_DIR=/opt/airflow/dags/repo/config
      - APP_ENV=${APP_ENV:-prod}
      - AWS_REGION=${AWS_REGION:-eu-west-3}
      - S3_BUCKET=${S3_BUCKET:-lakehouse-assurance-moto-prod}
      - AIRFLOW_INIT=${AIRFLOW_INIT:-false}
    volumes:
      - airflow_logs:/opt/airflow/logs
      - airflow_work:/opt/airflow/work
      - airflow_dags:/opt/airflow/dags
    depends_on:
      - git-sync
    networks:
      - lakehouse-network
    restart: unless-stopped

  airflow-flower:
    image: ${AIRFLOW_IMAGE}
    container_name: lakehouse-airflow-flower
    command: ["celery", "flower"]
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW_DB_CONN}
      - AIRFLOW__CELERY__BROKER_URL=${AIRFLOW_BROKER_URL}
      - AIRFLOW__CELERY__RESULT_BACKEND=${AIRFLOW_RESULT_BACKEND}
      - AIRFLOW__CELERY__BROKER_USE_SSL=True
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags/repo/orchestration/airflow/dags
      - AIRFLOW__CORE__PLUGINS_FOLDER=/opt/airflow/dags/repo/orchestration/airflow/plugins
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS=False
      - AIRFLOW__LOGGING__LOG_LEVEL=INFO
      - AIRFLOW__LOGGING__REMOTE_LOGGING=True
      - AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER=s3://${S3_BUCKET:-lakehouse-assurance-moto-prod}/airflow/logs
      - AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID=aws_default
      - AIRFLOW__LOGGING__ENCRYPT_S3_LOGS=True
      - EMR_SERVERLESS_APPLICATION_ID=${EMR_SERVERLESS_APPLICATION_ID:-}
      - EMR_SERVERLESS_EXECUTION_ROLE_ARN=${EMR_SERVERLESS_EXECUTION_ROLE_ARN:-}
      - EMR_SERVERLESS_S3_ENTRYPOINT=${EMR_SERVERLESS_S3_ENTRYPOINT:-}
      - EMR_SERVERLESS_LOG_URI=${EMR_SERVERLESS_LOG_URI:-}
      - PYTHONPATH=/opt/airflow/dags/repo/src
      - CONFIG_DIR=/opt/airflow/dags/repo/config
      - APP_ENV=${APP_ENV:-prod}
      - AWS_REGION=${AWS_REGION:-eu-west-3}
      - S3_BUCKET=${S3_BUCKET:-lakehouse-assurance-moto-prod}
      - AIRFLOW_INIT=${AIRFLOW_INIT:-false}
    ports:
      - "8793:8793"   # Flower UI
    volumes:
      - airflow_dags:/opt/airflow/dags
    depends_on:
      - git-sync
    networks:
      - lakehouse-network
    restart: unless-stopped
    profiles: ["flower"]

volumes:
  spark_logs:
    driver: local
  spark_work:
    driver: local
  airflow_logs:
    driver: local
  airflow_work:
    driver: local
  airflow_dags:
    driver: local
  postgres_data:
    driver: local

networks:
  lakehouse-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16
