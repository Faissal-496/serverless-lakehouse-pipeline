# =============================================================================
# Docker Compose for AWS EC2 deployment
# =============================================================================
# Used by terraform/user_data/airflow.sh on EC2 instances.
# External dependencies: RDS (PostgreSQL), Amazon MQ (RabbitMQ)
# All connection strings come from the .env file generated by user_data.
#
# IMPORTANT: Set AIRFLOW_WEBSERVER_SECRET_KEY in .env before running.
# Generate with: python3 -c "import secrets; print(secrets.token_hex(32))"
# =============================================================================

version: '3.8'

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE}
  restart: unless-stopped
  environment:
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__DEFAULT_TASK_RETRIES: '2'
    AIRFLOW__CORE__DEFAULT_TASK_RETRY_DELAY_SEC: '300'
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_CONN}
    AIRFLOW__CELERY__BROKER_URL: ${AIRFLOW_BROKER_URL}
    AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW_RESULT_BACKEND}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    PYTHONPATH: /app/src
    SPARK_HOME: /opt/spark
    APP_ENV: ${APP_ENV:-prod}
    CONFIG_DIR: /app/config
    S3_BUCKET: ${S3_BUCKET}
    AWS_DEFAULT_REGION: ${AWS_REGION:-eu-west-3}
  volumes:
    - dags_data:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
  networks:
    - lakehouse_aws

services:
  # GitSync sidecar: pulls DAGs from GitHub
  git-sync:
    image: registry.k8s.io/git-sync/git-sync:v4.1.0
    restart: unless-stopped
    environment:
      GITSYNC_REPO: ${GIT_SYNC_REPO}
      GITSYNC_BRANCH: ${GIT_SYNC_BRANCH:-main}
      GITSYNC_ROOT: /git
      GITSYNC_DEST: dags
      GITSYNC_WAIT: "60"
      GITSYNC_ONE_TIME: "false"
    volumes:
      - dags_data:/git
    networks:
      - lakehouse_aws

  # Airflow Webserver
  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "
        if [ \"$${AIRFLOW_INIT:-false}\" = 'true' ]; then
          airflow db migrate
          airflow users create --username admin --password admin \
            --firstname Airflow --lastname Admin --role Admin \
            --email admin@example.com || true
        fi
        exec airflow webserver
      "
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Airflow Scheduler
  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "
        if [ \"$${AIRFLOW_INIT:-false}\" = 'true' ]; then
          airflow db migrate
        fi
        exec airflow scheduler
      "

  # Airflow Worker (scale with --scale airflow-worker=N)
  airflow-worker:
    <<: *airflow-common
    command: celery worker --queues=default

  # Airflow Flower (optional monitoring)
  airflow-flower:
    <<: *airflow-common
    command: celery flower
    ports:
      - "5555:5555"
    profiles:
      - flower

volumes:
  dags_data:
  airflow_logs:

networks:
  lakehouse_aws:
    driver: bridge
