version: '3.8'

services:
  # ============================================================================
  # POSTGRESQL - Airflow & Glue Metadata
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: lakehouse-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-airflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-airflow}
      POSTGRES_DB: ${DB_NAME:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../config/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-airflow} -d ${DB_NAME:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse-network
    restart: unless-stopped

  # ============================================================================
  # SPARK - ETL Engine
  # ============================================================================
  spark:
    build:
      context: ../..
      dockerfile: docker/spark/Dockerfile
      cache_from:
        - lakehouse-aws-prod:latest
    image: lakehouse-aws-prod:latest
    container_name: lakehouse-spark
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - S3_BUCKET=${S3_BUCKET:-lakehouse-assurance-moto-dev}
      - GLUE_DB_NAME=${GLUE_DB_NAME:-lakehouse_assurance_moto_catalog}
      - DATA_BASE_PATH=/opt/lakehouse/data
      - SPARK_MASTER=local[*]
      - PYTHONPATH=/opt/lakehouse/src
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - ../../.env
    volumes:
      - ../../src:/opt/lakehouse/src:ro
      - ../../config:/opt/lakehouse/config:ro
      - lakehouse_data:/opt/lakehouse/data
      - spark_logs:/opt/spark/logs
    ports:
      - "4040:4040"   # Spark UI
      - "18080:18080" # Spark History Server
    depends_on:
      data_init:
        condition: service_completed_successfully
    networks:
      - lakehouse-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================================================
  # AIRFLOW - Orchestration
  # ============================================================================
  airflow:
    build:
      context: ../..
      dockerfile: docker/airflow/Dockerfile
      cache_from:
        - lakehouse-airflow:latest
    image: lakehouse-airflow:latest
    container_name: lakehouse-airflow
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags/repo/orchestration/airflow/dags
      - AIRFLOW__CORE__PLUGINS_FOLDER=/opt/airflow/dags/repo/orchestration/airflow/plugins
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER:-airflow}:${DB_PASSWORD:-airflow}@postgres:5432/${DB_NAME:-airflow}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__PARALLELISM=4
      - AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG=1
      - PYTHONPATH=/opt/airflow/dags/repo/src
      - CONFIG_DIR=/opt/airflow/dags/repo/config
      - APP_ENV=${APP_ENV:-dev}
      - S3_BUCKET=${S3_BUCKET:-lakehouse-assurance-moto-dev}
      - GLUE_DATABASE=${GLUE_DATABASE:-lakehouse_assurance_moto_catalog}
      - GLUE_DB_NAME=${GLUE_DB_NAME:-lakehouse_assurance_moto_catalog}
    env_file:
      - ../../.env
    volumes:
      - airflow_logs:/opt/airflow/logs
      - airflow_dags:/opt/airflow/dags
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      git-sync:
        condition: service_started
    networks:
      - lakehouse-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================================================
  # AIRFLOW SCHEDULER (Local dev)
  # ============================================================================
  airflow-scheduler:
    image: lakehouse-airflow:latest
    container_name: lakehouse-airflow-scheduler
    environment:
      - AIRFLOW_HOME=/opt/airflow
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags/repo/orchestration/airflow/dags
      - AIRFLOW__CORE__PLUGINS_FOLDER=/opt/airflow/dags/repo/orchestration/airflow/plugins
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER:-airflow}:${DB_PASSWORD:-airflow}@postgres:5432/${DB_NAME:-airflow}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - PYTHONPATH=/opt/airflow/dags/repo/src
      - CONFIG_DIR=/opt/airflow/dags/repo/config
      - APP_ENV=${APP_ENV:-dev}
      - S3_BUCKET=${S3_BUCKET:-lakehouse-assurance-moto-dev}
      - GLUE_DATABASE=${GLUE_DATABASE:-lakehouse_assurance_moto_catalog}
      - GLUE_DB_NAME=${GLUE_DB_NAME:-lakehouse_assurance_moto_catalog}
    env_file:
      - ../../.env
    volumes:
      - airflow_logs:/opt/airflow/logs
      - airflow_dags:/opt/airflow/dags
    command: ["scheduler"]
    depends_on:
      postgres:
        condition: service_healthy
      git-sync:
        condition: service_started
    networks:
      - lakehouse-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ============================================================================
  # DATA INITIALIZATION
  # ============================================================================
  data_init:
    image: alpine:latest
    volumes:
      - ../../data:/tmp/data:ro
      - lakehouse_data:/opt/lakehouse/data
    entrypoint: ["sh", "-c", "cp -rv /tmp/data/* /opt/lakehouse/data/ && chmod -R 755 /opt/lakehouse/data && echo 'Data initialization completed'"]
    restart: "no"
    networks:
      - lakehouse-network

  # ============================================================================
  # GIT SYNC - Local Dev (simulate prod GitSync)
  # ============================================================================
  git-sync:
    image: registry.k8s.io/git-sync/git-sync:v4.1.0
    container_name: lakehouse-git-sync
    environment:
      - GIT_SYNC_REPO=${GIT_SYNC_REPO}
      - GIT_SYNC_BRANCH=${GIT_SYNC_BRANCH:-main}
      - GIT_SYNC_ROOT=/opt/airflow/dags
      - GIT_SYNC_DEST=repo
      - GIT_SYNC_WAIT=60
      - GIT_SYNC_ONE_TIME=false
      - GIT_SYNC_DEPTH=1
      - GIT_SYNC_MAX_FAILURES=-1
    volumes:
      - airflow_dags:/opt/airflow/dags
    networks:
      - lakehouse-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  lakehouse_data:
    driver: local
  spark_logs:
    driver: local
  airflow_logs:
    driver: local

networks:
  lakehouse-network:
    driver: bridge
    name: lakehouse-network
