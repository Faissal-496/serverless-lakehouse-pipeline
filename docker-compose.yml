version: '3.8'

services:
  # ============================================================================
  # BUILD-TIME SERVICE: Spark Base Image
  # Creates the unified lakehouse-spark-base image used by master and workers
  # ============================================================================
  spark-base-builder:
    image: lakehouse-spark-base:latest
    build:
      context: .
      dockerfile: docker/spark/Dockerfile.base
    # This service doesn't need to run, just provides the base image
    command: echo "Base image built successfully"
    networks:
      - lakehouse_network

  # PostgreSQL - Airflow metadata + task state
  postgres:
    image: postgres:15-alpine
    container_name: lakehouse-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse_network

  # Redis - Celery broker
  redis:
    image: redis:7-alpine
    container_name: lakehouse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse_network

  # Spark Master
  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile.master
    image: lakehouse-spark-master:3.5.0
    container_name: lakehouse-spark-master
    hostname: spark-master
    depends_on:
      - spark-base-builder
    env_file:
      - .env.docker
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
      SPARK_LOCAL_IP: spark-master
    ports:
      - "7077:7077"  # Spark RPC
      - "8084:8080"  # Spark Web UI
    volumes:
      - ./data:/data:ro
      - ./config:/app/config:ro
      - spark_data:/tmp/spark_output
      - spark_logs:/opt/lakehouse/logs
      - ./src:/app/src:ro
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7077"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Spark Worker 1
  spark-worker-1:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile.worker
    image: lakehouse-spark-worker:3.5.0
    container_name: lakehouse-spark-worker-1
    hostname: spark-worker-1
    depends_on:
      spark-master:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_WORKER_PORT: 7078
      SPARK_WORKER_WEBUI_PORT: 8081
      SPARK_LOCAL_IP: spark-worker-1
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
    ports:
      - "7078:7078"  # Spark Worker RPC
      - "8081:8081"  # Spark Worker WebUI
    volumes:
      - ./data:/data:ro
      - ./config:/app/config:ro
      - spark_data:/tmp/spark_output
      - spark_logs:/opt/lakehouse/logs
      - ./src:/app/src:ro
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7078"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Spark Worker 2
  spark-worker-2:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile.worker
    image: lakehouse-spark-worker:3.5.0
    container_name: lakehouse-spark-worker-2
    hostname: spark-worker-2
    depends_on:
      spark-master:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_WORKER_PORT: 7079
      SPARK_WORKER_WEBUI_PORT: 8082
      SPARK_LOCAL_IP: spark-worker-2
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
    ports:
      - "7079:7079"  # Spark Worker RPC
      - "8082:8082"  # Spark Worker WebUI
    volumes:
      - ./data:/data:ro
      - ./config:/app/config:ro
      - spark_data:/tmp/spark_output
      - spark_logs:/opt/lakehouse/logs
      - ./src:/app/src:ro
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7079"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Airflow DB init
  airflow-db-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: lakehouse-airflow:2.9.0
    container_name: lakehouse-airflow-db-init
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: secretkey
      # AWS Credentials
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      S3_BUCKET: ${S3_BUCKET}
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags:ro
      - ./src:/app/src:ro
      - airflow_logs:/opt/airflow/logs
    command: bash -c "airflow db init && airflow users create --username airflow --password airflow --firstname Airflow --lastname Admin --role Admin --email admin@example.com || true"
    networks:
      - lakehouse_network

  # Airflow Webserver
  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: lakehouse-airflow:2.9.0
    container_name: lakehouse-airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-db-init:
        condition: service_completed_successfully
    env_file:
      - .env.docker
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__DEFAULT_TASK_RETRIES: '2'
      AIRFLOW__CORE__DEFAULT_TASK_RETRY_DELAY_SEC: '300'
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: secretkey
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      # Python environment
      PYTHONPATH: /app/src:${PYTHONPATH:-}
      # Spark configuration
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_HOME: /opt/spark
      PYSPARK_PYTHON: /home/airflow/.local/bin/python3
      PYSPARK_DRIVER_PYTHON: /home/airflow/.local/bin/python3
      # AWS Credentials
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      S3_BUCKET: ${S3_BUCKET}
      # Lakehouse configuration
      DATA_BASE_PATH: /data
      APP_ENV: dev
      CONFIG_DIR: /app/config
      GLUE_DATABASE: lakehouse_assurance
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags:ro
      - ./src:/app/src:ro
      - ./config:/app/config:ro
      - ./data:/data:ro
      - spark_data:/tmp/spark_output
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Airflow Scheduler
  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: lakehouse-airflow:2.9.0
    container_name: lakehouse-airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-webserver:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__DEFAULT_TASK_RETRIES: '2'
      AIRFLOW__CORE__DEFAULT_TASK_RETRY_DELAY_SEC: '300'
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: secretkey
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      # Python environment
      PYTHONPATH: /app/src:${PYTHONPATH:-}
      # Spark configuration
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_HOME: /opt/spark
      PYSPARK_PYTHON: /home/airflow/.local/bin/python3
      PYSPARK_DRIVER_PYTHON: /home/airflow/.local/bin/python3
      # AWS Credentials
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      S3_BUCKET: ${S3_BUCKET}
      # Lakehouse configuration
      DATA_BASE_PATH: /data
      APP_ENV: dev
      CONFIG_DIR: /app/config
      GLUE_DATABASE: lakehouse_assurance
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags:ro
      - ./src:/app/src:ro
      - ./config:/app/config:ro
      - ./data:/data:ro
      - spark_data:/tmp/spark_output
      - spark_logs:/opt/lakehouse/logs
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    networks:
      - lakehouse_network

  # Airflow Worker 1
  airflow-worker-1:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: lakehouse-airflow:2.9.0
    container_name: lakehouse-airflow-worker-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      spark-master:
        condition: service_started
    env_file:
      - .env.docker
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__DEFAULT_TASK_RETRIES: '2'
      AIRFLOW__CORE__DEFAULT_TASK_RETRY_DELAY_SEC: '300'
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: secretkey
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      # Python environment
      PYTHONPATH: /app/src:${PYTHONPATH:-}
      # Spark configuration
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_HOME: /opt/spark
      PYSPARK_PYTHON: /home/airflow/.local/bin/python3
      PYSPARK_DRIVER_PYTHON: /home/airflow/.local/bin/python3
      # AWS Credentials
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      S3_BUCKET: ${S3_BUCKET}
      # Lakehouse configuration
      DATA_BASE_PATH: /data
      APP_ENV: dev
      CONFIG_DIR: /app/config
      GLUE_DATABASE: lakehouse_assurance
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags:ro
      - ./src:/app/src:ro
      - ./config:/app/config:ro
      - ./data:/data:ro
      - spark_data:/tmp/spark_output
      - spark_logs:/opt/lakehouse/logs
      - airflow_logs:/opt/airflow/logs
    command: celery worker --queues=default
    networks:
      - lakehouse_network

  # Airflow Worker 2
  airflow-worker-2:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: lakehouse-airflow:2.9.0
    container_name: lakehouse-airflow-worker-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      spark-master:
        condition: service_started
    env_file:
      - .env.docker
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__DEFAULT_TASK_RETRIES: '2'
      AIRFLOW__CORE__DEFAULT_TASK_RETRY_DELAY_SEC: '300'
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://airflow:airflow@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: secretkey
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      # Python environment
      PYTHONPATH: /app/src:${PYTHONPATH:-}
      # Spark configuration
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_HOME: /opt/spark
      PYSPARK_PYTHON: /home/airflow/.local/bin/python3
      PYSPARK_DRIVER_PYTHON: /home/airflow/.local/bin/python3
      # AWS Credentials
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      S3_BUCKET: ${S3_BUCKET}
      # Lakehouse configuration
      DATA_BASE_PATH: /data
      APP_ENV: dev
      CONFIG_DIR: /app/config
      GLUE_DATABASE: lakehouse_assurance
    volumes:
      - ./orchestration/airflow/dags:/opt/airflow/dags:ro
      - ./src:/app/src:ro
      - ./config:/app/config:ro
      - ./data:/data:ro
      - spark_data:/tmp/spark_output
      - spark_logs:/opt/lakehouse/logs
      - airflow_logs:/opt/airflow/logs
    command: celery worker --queues=default
    networks:
      - lakehouse_network

volumes:
  postgres_data:
  spark_data:
  spark_logs:
  airflow_logs:

networks:
  lakehouse_network:
    driver: bridge
