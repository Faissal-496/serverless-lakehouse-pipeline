# =============================================================================
# Lakehouse Pipeline — Local Development Stack
# =============================================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  image: lakehouse-airflow:2.9.0
  env_file:
    - .env.docker
  environment: &airflow-env
    # --- Airflow Core ---
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__DEFAULT_TASK_RETRIES: "2"
    AIRFLOW__CORE__DEFAULT_TASK_RETRY_DELAY_SEC: "300"
    # --- Celery ---
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres:5432/airflow
    # --- Database ---
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://airflow:airflow@postgres:5432/airflow
    # --- Webserver ---
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    # --- Logging ---
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    # --- Python / Spark ---
    PYTHONPATH: /app/src
    SPARK_MASTER_URL: spark://spark-master:7077
    SPARK_HOME: /opt/spark
    PYSPARK_PYTHON: /home/airflow/.local/bin/python3
    PYSPARK_DRIVER_PYTHON: /home/airflow/.local/bin/python3
    # --- AWS (resolved from .env) ---
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    S3_BUCKET: ${S3_BUCKET}
    # --- Lakehouse ---
    APP_ENV: prod
    CONFIG_DIR: /app/config
    DATA_BASE_PATH: /data
    GLUE_DATABASE: lakehouse_assurance
  volumes: &airflow-volumes
    - ./orchestration/airflow/dags:/opt/airflow/dags:ro
    - ./src:/app/src:ro
    - ./config:/app/config:ro
    - airflow_logs:/opt/airflow/logs
  networks:
    - lakehouse_network

services:
  # ==========================================================================
  # Infrastructure
  # ==========================================================================
  spark-base-builder:
    image: lakehouse-spark-base:latest
    build:
      context: .
      dockerfile: docker/spark/Dockerfile.base
    command: echo "Base image built"
    networks:
      - lakehouse_network

  postgres:
    image: postgres:15-alpine
    container_name: lakehouse-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse_network

  redis:
    image: redis:7-alpine
    container_name: lakehouse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse_network

  # ==========================================================================
  # Spark Cluster — reduced for 16 GB laptop
  # ==========================================================================
  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile.master
    image: lakehouse-spark-master:3.5.0
    container_name: lakehouse-spark-master
    hostname: spark-master
    depends_on:
      - spark-base-builder
    env_file:
      - .env.docker
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
      SPARK_LOCAL_IP: spark-master
    ports:
      - "7077:7077"
      - "8084:8080"
    volumes:
      - ./config:/app/config:ro
      - ./src:/app/src:ro
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD", "nc", "-z", "spark-master", "7077"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  spark-worker-1:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile.worker
    image: lakehouse-spark-worker:3.5.0
    container_name: lakehouse-spark-worker-1
    hostname: spark-worker-1
    depends_on:
      spark-master:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_WORKER_PORT: 7078
      SPARK_WORKER_WEBUI_PORT: 8081
      SPARK_LOCAL_IP: spark-worker-1
      SPARK_WORKER_CORES: 1
      SPARK_WORKER_MEMORY: 1g
    ports:
      - "7078:7078"
      - "8081:8081"
    volumes:
      - ./config:/app/config:ro
      - ./src:/app/src:ro
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD", "nc", "-z", "spark-worker-1", "7078"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  spark-worker-2:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile.worker
    image: lakehouse-spark-worker:3.5.0
    container_name: lakehouse-spark-worker-2
    hostname: spark-worker-2
    depends_on:
      spark-master:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_WORKER_PORT: 7079
      SPARK_WORKER_WEBUI_PORT: 8082
      SPARK_LOCAL_IP: spark-worker-2
      SPARK_WORKER_CORES: 1
      SPARK_WORKER_MEMORY: 1g
    ports:
      - "7079:7079"
      - "8082:8082"
    volumes:
      - ./config:/app/config:ro
      - ./src:/app/src:ro
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD", "nc", "-z", "spark-worker-2", "7079"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # Airflow
  # ==========================================================================
  airflow-db-init:
    <<: *airflow-common
    container_name: lakehouse-airflow-db-init
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "airflow db init &&
               airflow users create
                 --username airflow --password airflow
                 --firstname Airflow --lastname Admin
                 --role Admin --email admin@example.com || true"

  airflow-webserver:
    <<: *airflow-common
    container_name: lakehouse-airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-db-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  airflow-scheduler:
    <<: *airflow-common
    container_name: lakehouse-airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-db-init:
        condition: service_completed_successfully
    command: scheduler

  airflow-worker-1:
    <<: *airflow-common
    container_name: lakehouse-airflow-worker-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    command: celery worker --queues=default --concurrency=4

  airflow-worker-2:
    <<: *airflow-common
    container_name: lakehouse-airflow-worker-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    command: celery worker --queues=default --concurrency=4

  # ==========================================================================
  # Jenkins (single controller for local — HA agents via Docker Plugin)
  # ==========================================================================
  jenkins-controller-1:
    build:
      context: .
      dockerfile: docker/jenkins/Dockerfile
    image: lakehouse-jenkins:lts
    container_name: lakehouse-jenkins-1
    hostname: jenkins-1
    env_file:
      - .env.docker
    environment:
      JENKINS_ADMIN_USER: ${JENKINS_ADMIN_USER:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-admin}
      JAVA_OPTS: >-
        -Djenkins.install.runSetupWizard=false
        -Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true
        -Xmx512m
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace:ro
    ports:
      - "9080:8080"
      - "50000:50000"
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  postgres_data:
  airflow_logs:
  jenkins_home:

networks:
  lakehouse_network:
    driver: bridge
