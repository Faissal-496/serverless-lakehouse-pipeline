version: "3.9"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  image: lakehouse-airflow:2.9.0
  env_file:
    - .env.docker
  environment: &airflow-env
    # --- Airflow Core ---
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor

    # --- Celery ---
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: ${AIRFLOW_DB_CONN}

    # --- DATABASE (RDS !!!) ---
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_CONN}

    # --- Webserver ---
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}
    AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_BASE_URL}
    AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "true"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}

    # --- Spark ---
    SPARK_MASTER_URL: spark://spark-master:7077
    SPARK_HOME: /opt/spark

    # --- AWS ---
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    S3_BUCKET: ${S3_BUCKET}

    # --- App ---
    PYTHONPATH: /app/src
    APP_ENV: prod
    CONFIG_DIR: /app/config

  volumes:
    - ./orchestration/airflow/dags:/opt/airflow/dags
    - ./src:/app/src
    - ./config:/app/config
    - airflow_logs:/opt/airflow/logs

  networks:
    - lakehouse_network

# ======================================================================
# SERVICES
# ======================================================================

services:

  # =========================
  # REDIS (on garde local)
  # =========================
  redis:
    image: redis:7-alpine
    container_name: lakehouse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - lakehouse_network

  # =========================
  # SPARK
  # =========================
  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile.master
    container_name: spark-master
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "7077:7077"
      - "8084:8080"
    networks:
      - lakehouse_network

  spark-worker-1:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile.worker
    depends_on:
      - spark-master
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      SPARK_WORKER_CORES: 1
      SPARK_WORKER_MEMORY: 2g
    networks:
      - lakehouse_network

  spark-worker-2:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile.worker
    depends_on:
      - spark-master
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      SPARK_WORKER_CORES: 1
      SPARK_WORKER_MEMORY: 2g
    networks:
      - lakehouse_network

  # =========================
  # AIRFLOW
  # =========================
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
      airflow db init &&
      (
        airflow users create
          --username \"${AIRFLOW_ADMIN_USER}\"
          --password \"${AIRFLOW_ADMIN_PASSWORD}\"
          --firstname \"Admin\"
          --lastname \"User\"
          --role \"Admin\"
          --email \"${AIRFLOW_ADMIN_EMAIL}\" ||
        echo \"Airflow admin user already exists\"
      )
      "

  airflow-webserver:
    <<: *airflow-common
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init
    command: webserver

  airflow-scheduler:
    <<: *airflow-common
    restart: unless-stopped
    depends_on:
      - airflow-init
    command: scheduler

  airflow-worker:
    <<: *airflow-common
    restart: unless-stopped
    depends_on:
      - airflow-init
      - spark-master
    command: celery worker

  # =========================
  # JENKINS
  # =========================
  jenkins:
    build:
      context: .
      dockerfile: docker/jenkins/Dockerfile
    env_file:
      - .env.docker
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    restart: unless-stopped
    ports:
      - "9080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lakehouse_network

# ======================================================================
volumes:
  airflow_logs:
  jenkins_home:

networks:
  lakehouse_network:
