# Jenkins Configuration as Code for production deployment on AWS EC2.
# Agents are provisioned as Docker containers via the Docker Cloud plugin.
# The workspace is created by Jenkins inside the agent container (no host bind mount).
# Environment variables like ECR registry and AWS region are injected at runtime.

jenkins:
  systemMessage: "Lakehouse CI/CD - production (managed by JCasC)"
  numExecutors: 0
  mode: EXCLUSIVE

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER:-admin}"
          password: "${JENKINS_ADMIN_PASSWORD:-admin}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  clouds:
    - docker:
        name: "docker-cloud"
        dockerApi:
          dockerHost:
            uri: "unix:///var/run/docker.sock"
        templates:
          - labelString: "docker-agent"
            name: "docker-agent"
            dockerTemplateBase:
              image: "jenkins/agent:latest-jdk17"
              mounts:
                - "type=bind,source=/var/run/docker.sock,target=/var/run/docker.sock"
              environmentsString: |
                DOCKER_HOST=unix:///var/run/docker.sock
            remoteFs: "/home/jenkins/agent"
            connector:
              attach:
                user: "root"
            instanceCapStr: "4"
            retentionStrategy:
              idleMinutes: 5

unclassified:
  location:
    url: "${JENKINS_URL:-http://localhost:8080/}"
    adminAddress: "devops@octaa.tech"

security:
  globalJobDslSecurityConfiguration:
    useScriptSecurity: false