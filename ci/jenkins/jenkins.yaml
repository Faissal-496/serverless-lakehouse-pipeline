jenkins:
  systemMessage: "Lakehouse CI/CD — managed by JCasC"
  numExecutors: 0
  mode: EXCLUSIVE
  crumbIssuer:
    standard:
      excludeClientIPFromCrumb: true

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  clouds:
    - docker:
        name: "docker-local"
        dockerApi:
          dockerHost:
            uri: "unix:///var/run/docker.sock"
        templates:
          - labelString: "docker-agent"
            name: "docker-agent"
            dockerTemplateBase:
              image: "lakehouse-jenkins-agent:latest"
              mounts:
                - "type=bind,source=/var/run/docker.sock,target=/var/run/docker.sock"
              environmentsString: |
                PYTHONPATH=/workspace/src
            remoteFs: "/home/jenkins/agent"
            connector:
              attach:
                user: "root"
            instanceCapStr: "4"
            retentionStrategy:
              idleMinutes: 5

unclassified:
  location:
    url: "${JENKINS_PUBLIC_URL}"
    adminAddress: "devops@company.com"

jobs:
  - script: |
      pipelineJob('lakehouse-ci') {
        description('Lakehouse CI/CD — lint + DAG validation + test + package build')
        properties {
          githubProjectUrl('https://github.com/Faissal-496/serverless-lakehouse-pipeline/')
        }
        triggers {
          githubPush()
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/Faissal-496/serverless-lakehouse-pipeline.git')
                }
                branches('*/migration_prod')
              }
            }
            scriptPath('Jenkinsfile.local')
            lightweight(true)
          }
        }
      }

security:
  globalJobDslSecurityConfiguration:
    useScriptSecurity: false
