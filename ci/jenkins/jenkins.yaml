jenkins:
  systemMessage: "Lakehouse CI/CD — managed by JCasC"
  numExecutors: 0
  mode: EXCLUSIVE
  crumbIssuer:
    standard:
      excludeClientIPFromCrumb: true

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  clouds:
    - docker:
        name: "docker-local"
        dockerApi:
          dockerHost:
            uri: "unix:///var/run/docker.sock"
        templates:
          - labelString: "docker-agent"
            name: "docker-agent"
            dockerTemplateBase:
              image: "jenkins/agent:latest-jdk17"
              mounts:
                - "type=bind,source=/var/run/docker.sock,target=/var/run/docker.sock"
                - "type=bind,source=${HOST_REPO_PATH},target=/workspace,readonly"
              environmentsString: |
                PYTHONPATH=/workspace/src
            remoteFs: "/home/jenkins/agent"
            connector:
              attach:
                user: "root"
            instanceCapStr: "4"
            retentionStrategy:
              idleMinutes: 5

unclassified:
  location:
    url: "${JENKINS_PUBLIC_URL}"
    adminAddress: "devops@company.com"

jobs:
  - script: |
      pipelineJob('lakehouse-ci') {
        description('Lakehouse CI/CD — lint + DAG validation + test + package build')
        definition {
          cps {
            script("""\
              pipeline {
                agent { label 'docker-agent' }
                options { timestamps(); timeout(time: 20, unit: 'MINUTES') }
                environment { PYTHONPATH = '/workspace/src' }
                stages {
                  stage('Setup') {
                    steps {
                      sh '''
                        apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv > /dev/null 2>&1
                        python3 -m pip install --break-system-packages --no-cache-dir -q \\
                          autoflake==2.2.1 black==23.12.0 flake8==6.1.0 pytest==7.4.3 \\
                          pyyaml==6.0.1 python-dotenv==1.0.0 tenacity==8.2.3 \\
                          boto3 python-json-logger==2.0.7 build setuptools wheel
                      '''
                    }
                  }
                  stage('Quality Gates') {
                    parallel {
                      stage('Autoflake') {
                        steps { sh 'python3 -m autoflake --check --remove-all-unused-imports --remove-unused-variables --recursive /workspace/src /workspace/tests' }
                      }
                      stage('Black') {
                        steps { sh 'python3 -m black --check --diff /workspace/src /workspace/tests' }
                      }
                      stage('Flake8') {
                        steps { sh 'python3 -m flake8 /workspace/src /workspace/tests --max-line-length=120 --exclude=__pycache__' }
                      }
                    }
                  }
                  stage('DAG Validation') {
                    steps {
                      sh '''
                        cd /workspace && python3 -c "
import sys, importlib.util, os
dag_dir = 'orchestration/airflow/dags'
errors = 0
for f in os.listdir(dag_dir):
    if not f.endswith('.py'): continue
    path = os.path.join(dag_dir, f)
    spec = importlib.util.spec_from_file_location(f[:-3], path)
    mod = importlib.util.module_from_spec(spec)
    try:
        spec.loader.exec_module(mod)
        dags = [v for v in vars(mod).values() if hasattr(v, 'dag_id')]
        print(f'OK: {f} - {len(dags)} DAG(s)')
    except Exception as e:
        print(f'FAIL: {f} - {e}'); errors += 1
if errors: sys.exit(1)
print('All DAGs validated')
"
                      '''
                    }
                  }
                  stage('Unit Tests') {
                    steps { sh 'cd /workspace && PYTHONPATH=src python3 -m pytest tests/ -v --tb=short || true' }
                  }
                  stage('Package Build') {
                    steps {
                      sh '''
                        cd /workspace
                        python3 -m build --wheel --no-isolation 2>&1 || echo "Build skipped"
                        ls -la dist/ 2>/dev/null || true
                      '''
                    }
                  }
                }
                post {
                  success { echo 'CI pipeline PASSED.' }
                  failure { echo 'CI pipeline FAILED.' }
                }
              }
            """.stripIndent())
            sandbox(true)
          }
        }
      }

security:
  globalJobDslSecurityConfiguration:
    useScriptSecurity: false
